spring:
  application:
    name: fittribe-api

  # ── Database ──────────────────────────────────────────────────────────
  datasource:
    url: ${DB_URL}
    username: ${DB_USERNAME}
    password: ${DB_PASSWORD}
    driver-class-name: org.postgresql.Driver

  # ── JPA ───────────────────────────────────────────────────────────────
  jpa:
    hibernate:
      ddl-auto: validate          # Flyway owns the schema — never let Hibernate alter it
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect
        format_sql: true
    show-sql: false
    open-in-view: false

  # ── Flyway ────────────────────────────────────────────────────────────
  flyway:
    enabled: true
    locations: classpath:db/migration
    baseline-on-migrate: false

  # ── MVC ───────────────────────────────────────────────────────────────
  mvc:
    # Throw NoHandlerFoundException for unknown paths instead of forwarding to /error.
    # Requires web.resources.add-mappings=false — otherwise the default static resource
    # handler matches everything and NoHandlerFoundException is never raised.
    throw-exception-if-no-handler-found: true
  web:
    resources:
      add-mappings: false

# ── JWT ───────────────────────────────────────────────────────────────
jwt:
  secret: ${JWT_SECRET}
  expiration-ms: 2592000000  # 30 days

# ── Firebase ──────────────────────────────────────────────────────────
firebase:
  project-id: ${FIREBASE_PROJECT_ID:placeholder}
  service-account-path: ${FIREBASE_SA_PATH:firebase-service-account.json}

# ── OpenAI (Phase 2 – AI Coach) ───────────────────────────────────────
openai:
  api-key: ${OPENAI_API_KEY:}
  model: gpt-4o
  max-tokens: 150
  insight-min-sets: 8

# ── Error responses ───────────────────────────────────────────────────
# Ensure Spring Boot's /error endpoint never leaks stack traces or internal
# exception messages to the client, regardless of environment.
server:
  error:
    include-stacktrace: never
    include-message: never
    include-binding-errors: never

# ── Logging ───────────────────────────────────────────────────────────
logging:
  level:
    com.fittribe: DEBUG
    org.flywaydb: INFO

# ── Mock auth (local dev only — never enable on Railway) ──────────────
app:
  mock-auth-enabled: false

# ── Admin endpoints (Wynners A1.5) ────────────────────────────────────
# Shared secret required on the X-Admin-Secret header for
# /api/v1/admin/jobs/**. The default is intentionally empty so the app
# starts cleanly without ADMIN_SECRET set — the controller treats an
# empty/missing config as "reject all admin requests", so leaving this
# unset is a safe deny-by-default posture for local dev.
fittribe:
  admin:
    secret: ${ADMIN_SECRET:}
